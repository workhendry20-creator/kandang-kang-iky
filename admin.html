<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel — Kandang Kang Iky</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root {
            --primary: #1E3E2B;
            --accent: #478A14;
            --slateBg: #FAFAFA;
        }
    </style>
</head>
<body class="bg-[#FAFAFA] text-neutral-800 antialiased font-sans">

    <!-- NAVBAR ADMIN -->
    <nav class="bg-[#1E3E2B] text-white px-6 py-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-sm">👑</div>
                <div>
                    <h1 class="text-sm font-bold tracking-wide">Kandang Kang Iky</h1>
                    <p class="text-[10px] text-neutral-300">Pusat Kendali Konten v1.0</p>
                </div>
            </div>
            <a href="index.html" class="text-xs bg-white/10 hover:bg-white/20 px-4 py-2 rounded-lg transition font-medium tracking-wide">
                ← Lihat Web Utama
            </a>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="max-w-7xl mx-auto px-6 py-10">
        <div class="grid md:grid-cols-12 gap-8">
            
            <!-- SISI KIRI: INPUT FORM MODIFIKASI -->
            <div class="md:col-span-7 space-y-6">
                
                <!-- KARTU 1: HEADLINE & BANNER -->
                <div class="bg-white p-6 rounded-2xl border border-neutral-200/60 shadow-xs">
                    <h2 class="text-sm font-bold text-[#1E3E2B] uppercase tracking-wider mb-4 flex items-center gap-2">
                        📝 Teks Utama & Banner
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[11px] font-bold uppercase text-neutral-400 mb-1">Judul Utama (Hero Text)</label>
                            <input type="text" id="inputTitle" value="Cari Domba Sehat & Sesuai Syariat?" class="w-full bg-[#FAFAFA] border border-neutral-200 px-3 py-2.5 rounded-xl text-xs font-light focus:outline-none focus:border-[#478A14] focus:bg-white transition">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold uppercase text-neutral-400 mb-1">Sub-Judul Promosi</label>
                            <textarea id="inputSubtitle" rows="2" class="w-full bg-[#FAFAFA] border border-neutral-200 px-3 py-2.5 rounded-xl text-xs font-light focus:outline-none focus:border-[#478A14] focus:bg-white transition resize-none">Menyediakan domba qurban dan aqiqah berkualitas tinggi, dirawat dengan amanah dan terpercaya.</textarea>
                        </div>
                    </div>
                </div>

                <!-- KARTU 2: KATALOG HARGA DOMBA -->
                <div class="bg-white p-6 rounded-2xl border border-neutral-200/60 shadow-xs">
                    <h2 class="text-sm font-bold text-[#1E3E2B] uppercase tracking-wider mb-4 flex items-center gap-2">
                        💰 Update Harga & Paket
                    </h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[11px] font-bold uppercase text-neutral-400 mb-1">Harga Paket Qurban (Mulai Dari)</label>
                            <input type="text" id="priceQurban" value="Rp 2.500.000" class="w-full bg-[#FAFAFA] border border-neutral-200 px-3 py-2.5 rounded-xl text-xs font-light focus:outline-none focus:border-[#478A14] focus:bg-white transition">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold uppercase text-neutral-400 mb-1">Harga Paket Aqiqah (Mulai Dari)</label>
                            <input type="text" id="priceAqiqah" value="Rp 1.900.000" class="w-full bg-[#FAFAFA] border border-neutral-200 px-3 py-2.5 rounded-xl text-xs font-light focus:outline-none focus:border-[#478A14] focus:bg-white transition">
                        </div>
                    </div>
                </div>

                <!-- TOMBOL GENERATE -->
                <button onclick="generateJSON()" class="w-full bg-[#1E3E2B] hover:bg-opacity-90 text-white font-bold text-xs tracking-widest uppercase py-4 rounded-xl transition shadow-sm cursor-pointer">
                    ⚙️ Proses & Perbarui Data Website
                </button>

            </div>

            <!-- SISI KANAN: OUTPUT HASIL KODE -->
            <div class="md:col-span-5 space-y-6">
                <div class="bg-white p-6 rounded-2xl border border-neutral-200/60 shadow-xs sticky top-24">
                    <div class="flex justify-between items-center mb-3">
                        <h2 class="text-sm font-bold text-[#1E3E2B] uppercase tracking-wider flex items-center gap-2">
                            📦 Hasil Kode JSON
                        </h2>
                        <span class="text-[10px] bg-amber-100 text-amber-800 px-2 py-0.5 rounded font-bold uppercase">Copy-Paste</span>
                    </div>
                    <p class="text-neutral-400 text-[11px] font-light mb-4 leading-relaxed">
                        Setiap kali kamu mengubah data di sebelah kiri, klik tombol proses, lalu salin kode di bawah ini ke bagian atas script <code class="bg-neutral-100 px-1 rounded text-red-500 font-mono">index.html</code>.
                    </p>

                    <!-- KOTAK OUTPUT KODE -->
                    <textarea id="jsonOutput" readonly rows="8" class="w-full bg-neutral-900 text-green-400 p-4 rounded-xl text-xs font-mono border border-neutral-800 focus:outline-none resize-none" placeholder="// Kode konfigurasi akan muncul di sini..."></textarea>
                    
                    <button onclick="copyToClipboard()" class="w-full mt-4 bg-[#478A14] hover:bg-opacity-90 text-white font-bold text-xs tracking-widest uppercase py-3 rounded-xl transition shadow-xs cursor-pointer">
                        📋 Salin Kode JSON
                    </button>
                    <p id="copyStatus" class="text-center text-[11px] text-emerald-600 font-medium mt-2 opacity-0 transition-opacity">Kode berhasil disalin!</p>
                </div>
            </div>

        </div>
    </main>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        function generateJSON() {
            // Mengambil semua data input dari form
            const data = {
                title: document.getElementById('inputTitle').value,
                subtitle: document.getElementById('inputSubtitle').value,
                priceQurban: document.getElementById('priceQurban').value,
                priceAqiqah: document.getElementById('priceAqiqah').value,
                lastUpdated: new Date().toLocaleDateString('id-ID')
            };

            // Mengubah objek data menjadi string teks JSON yang rapi
            const jsonString = JSON.stringify(data, null, 4);
            
            // Memasukkan hasil ke kotak hitam (textarea kanan)
            document.getElementById('jsonOutput').value = `const WEB_CONFIG = ${jsonString};`;
        }

        function copyToClipboard() {
            const copyText = document.getElementById("jsonOutput");
            if(!copyText.value) return alert("Silakan klik tombol Proses terlebih dahulu!");
            
            copyText.select();
            copyText.setSelectionRange(0, 99999); // Untuk perangkat mobile
            navigator.clipboard.writeText(copyText.value);
            
            // Animasi notifikasi berhasil disalin
            const status = document.getElementById("copyStatus");
            status.classList.remove("opacity-0");
            setTimeout(() => status.classList.add("opacity-0"), 2000);
        }

        // Jalankan sekali saat halaman pertama kali dibuka biar langsung terisi bawaannya
        window.onload = generateJSON;
    </script>
</body>
</html>
